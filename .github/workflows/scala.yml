name: zio-tarantool CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  scalafmt:
    name: scalafmt
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ adopt@1.11 ]
        scala: [ 3.3.6 ]
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4

      - name: Set up Java and Scala
        uses: olafurpg/setup-scala@v10
        with:
          java-version: ${{ matrix.java }}

      - name: scalafmt
        run: sbt ++${{ matrix.scala }} scalafmtCheckAll

  validate:
    name: Scala ${{ matrix.scala }}, Java ${{ matrix.java }}
    strategy:
      fail-fast: false
      matrix:
        java: [adopt@1.11]
        scala: [2.12.20, 2.13.18, 3.3.6]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4

      - name: Set up Java and Scala
        uses: olafurpg/setup-scala@v10
        with:
          java-version: ${{ matrix.java }}

      - name: Cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.coursier/cache/v1
            ~/.cache/coursier/v1
            ~/AppData/Local/Coursier/Cache/v1
            ~/Library/Caches/Coursier/v1
          key: ${{ runner.os }}-sbt-cache-v4-${{ hashFiles('**/*.sbt') }}-${{ hashFiles('project/build.properties') }}

      - name: Compile
        run: sbt ++${{ matrix.scala }} Test/compile
